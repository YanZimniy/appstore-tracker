name: Daily AppStore Tracker

on:
  schedule:
    - cron: '0 8 * * *' # запуск каждый день в 08:00 UTC
  workflow_dispatch: # позволяет запускать вручную

jobs:
  fetch-apps:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests psycopg2-binary python-telegram-bot

      - name: Run AppStore tracker
        run: python main.py

      - name: Commit results
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Update AppStore data" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
