name: Daily AppStore Tracker

on:
  schedule:
    - cron: '0 12 * * *' # запуск каждый день в 12:00 UTC
  workflow_dispatch: # возможность запускать вручную

jobs:
  fetch-apps:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AppStore fetch script
        id: run-app        # ← добавили id
        run: python main.py

      - name: Upload report
        if: success()       # теперь просто проверяем успешное выполнение
        uses: actions/upload-artifact@v4
        with:
          name: appstore-report
          path: report.json
